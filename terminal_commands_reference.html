<style>
*{box-sizing:border-box;margin:0;padding:0}
h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
body{font-family:var(--font-mono)}
#wrap{padding:1rem 0}
#search-bar{width:100%;padding:9px 14px;font-size:14px;font-family:var(--font-mono);background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);color:var(--color-text-primary);margin-bottom:1rem}
#search-bar::placeholder{color:var(--color-text-tertiary)}
#search-bar:focus{outline:none;border-color:var(--color-border-primary)}
.tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem}
.tab{font-size:12px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;font-family:var(--font-sans);transition:all .15s}
.tab:hover{background:var(--color-background-secondary)}
.tab.active{background:var(--color-background-secondary);border-color:var(--color-border-primary);color:var(--color-text-primary);font-weight:500}
.section{margin-bottom:1.5rem}
.section-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--color-text-tertiary);margin-bottom:10px;font-family:var(--font-sans)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:6px}
.cmd-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:9px 12px;cursor:pointer;transition:border-color .12s}
.cmd-card:hover{border-color:var(--color-border-secondary)}
.cmd-top{display:flex;align-items:baseline;gap:8px}
.cmd-name{font-size:13px;font-weight:500;color:var(--color-text-primary);font-family:var(--font-mono)}
.cmd-short{font-size:12px;color:var(--color-text-secondary);font-family:var(--font-sans);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmd-detail{display:none;margin-top:8px;border-top:0.5px solid var(--color-border-tertiary);padding-top:8px}
.cmd-detail.open{display:block}
.cmd-syntax{font-size:12px;color:var(--color-text-info);font-family:var(--font-mono);background:var(--color-background-secondary);padding:6px 10px;border-radius:6px;margin-bottom:6px;overflow-x:auto}
.flag-list{display:flex;flex-direction:column;gap:3px}
.flag{font-size:12px;display:flex;gap:8px}
.flag-key{color:var(--color-text-primary);font-family:var(--font-mono);min-width:80px;flex-shrink:0}
.flag-val{color:var(--color-text-secondary);font-family:var(--font-sans)}
.empty{text-align:center;padding:2rem;color:var(--color-text-tertiary);font-family:var(--font-sans);font-size:14px}
.badge{font-size:10px;padding:2px 7px;border-radius:20px;font-family:var(--font-sans);font-weight:500;background:var(--color-background-info);color:var(--color-text-info);flex-shrink:0}
</style>

<div id="wrap">
<h2 class="sr-only">Terminal commands reference with search and category filter</h2>
<input id="search-bar" type="search" placeholder="search commands…" oninput="filter()" />
<div class="tabs" id="tab-bar"></div>
<div id="content"></div>
</div>

let active = "All";
let open = null;
const cats = ["All",...Object.keys(DB)];
const all = Object.entries(DB).map(([cat,cmds])=>cmds.map(c=>({...c,cat}))).flat();

function tabs(){
  const el = document.getElementById("tab-bar");
  el.innerHTML = cats.map(c=>`<button class="tab${c===active?' active':''}" onclick="setTab('${c}')">${c}</button>`).join("");
}

function setTab(t){active=t;open=null;render();}

function filter(){open=null;render();}

function render(){
  const q = document.getElementById("search-bar").value.toLowerCase().trim();
  const pool = active==="All"?all:all.filter(x=>x.cat===active);
  const filtered = q?pool.filter(x=>x.c.includes(q)||x.s.toLowerCase().includes(q)):pool;
  const el = document.getElementById("content");
  if(!filtered.length){el.innerHTML=`<div class="empty"><i class="ti ti-search" style="font-size:24px;margin-bottom:8px;display:block" aria-hidden="true"></i>No commands match</div>`;return;}
  const grouped = {};
  filtered.forEach(x=>{(grouped[x.cat]||(grouped[x.cat]=[])).push(x)});
  el.innerHTML = Object.entries(grouped).map(([cat,cmds])=>`
    <div class="section">
      <div class="section-title">${cat} <span style="color:var(--color-text-tertiary);font-weight:400">(${cmds.length})</span></div>
      <div class="grid">${cmds.map(cmd=>card(cmd)).join("")}</div>
    </div>`).join("");
  tabs();
}

function card(cmd){
  const id = cmd.c+"_"+cmd.cat;
  const isOpen = open===id;
  const flags = cmd.flags.map(f=>{
    const sp=f.indexOf(" ");
    if(sp<0) return `<div class="flag"><span class="flag-key">${f}</span></div>`;
    return `<div class="flag"><span class="flag-key">${f.slice(0,sp)}</span><span class="flag-val">${f.slice(sp+1)}</span></div>`;
  }).join("");
  return `<div class="cmd-card" onclick="toggle('${id}')">
    <div class="cmd-top">
      <span class="cmd-name">${cmd.c}</span>
      <span class="cmd-short">${cmd.s}</span>
    </div>
    <div class="cmd-detail${isOpen?' open':''}">
      <div class="cmd-syntax">${cmd.syn}</div>
      <div class="flag-list">${flags||'<span style="font-size:12px;color:var(--color-text-tertiary);font-family:var(--font-sans)">No common flags</span>'}</div>
    </div>
  </div>`;
}

function toggle(id){
  open = open===id?null:id;
  render();
}

tabs();render();
</script>
